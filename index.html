<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>احسب أرباحك</title>

  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: black;
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .bg {
      width: 100%;
      height: 100%;
      object-fit: cover; /* 🔥 هذا هو الحل */
    }

    .btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #6bdc57;
      color: white;
      padding: 12px 25px;
      border-radius: 25px;
      font-size: 18px;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <img src="icon-512.png" class="bg">

  <a class="btn" href="https://wa.me/message/ODDMAKTZOMP2N1">
    احسب أرباحك الآن 💰
  </a>
</div>

</body>
</html>
