<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>حاسبة الأرباح</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: rgba(0,0,0,0.6);
    padding: 25px;
    border-radius: 20px;
    width: 90%;
    max-width: 350px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

h2 {
    text-align: center;
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

.calc {
    background: #00c9ff;
    color: black;
}

.whatsapp {
    background: #25D366;
    color: white;
}

.donate {
    background: #ff4d6d;
    color: white;
}

.result {
    text-align: center;
    margin-top: 15px;
    font-size: 20px;
    font-weight: bold;
}

.note {
    text-align:center;
    font-size:14px;
    margin-top:10px;
    opacity:0.8;
}
</style>

</head>

<body>

<div class="container">
    <h2>💰 حاسبة الأرباح</h2>

    <input type="number" id="buy" placeholder="ثمن الشراء">
    <input type="number" id="sell" placeholder="ثمن البيع">
    <input type="number" id="ship" placeholder="تكلفة التوصيل">

    <button class="calc" onclick="calcProfit()">احسب الربح</button>

    <div class="result" id="result">الربح: --</div>

    <button class="whatsapp" onclick="sendWhats()">
        إرسال عبر واتساب
    </button>

    <p class="note">إذا ساعدك التطبيق، دعمك يساعدنا نطوروه 🙏</p>

    <button class="donate" onclick="donate()">
        💖 دعم التطبيق
    </button>

</div>

<script>

let profitValue = null;

function calcProfit() {
    let buy = parseFloat(document.getElementById("buy").value) || 0;
    let sell = parseFloat(document.getElementById("sell").value) || 0;
    let ship = parseFloat(document.getElementById("ship").value) || 0;

    profitValue = sell - buy - ship;

    document.getElementById("result").innerText = "الربح: " + profitValue + " درهم";
}

function sendWhats() {

    if (profitValue === null) {
        alert("⚠ احسب الربح أولاً");
        return;
    }

    let message = "مرحبا، الربح هو: " + profitValue + " درهم";

    window.open("https://wa.me/?text=" + encodeURIComponent(message), "_blank");
}

function donate() {
    window.open("https://paypal.me/mixnourddine", "_blank");
}

</script>

</body>
</html>
